<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人记账应用</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>📒 个人记账</h1>
        <p>记录收入与支出，自动汇总并保存在本地。</p>
      </header>

      <section class="card">
        <h2>新增记录</h2>
        <form id="entry-form" class="form-grid">
          <label>
            类型
            <select id="type" required>
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
          </label>
          <label>
            金额（元）
            <input id="amount" type="number" min="0.01" step="0.01" required />
          </label>
          <label>
            分类
            <input id="category" type="text" placeholder="如：餐饮、工资" required />
          </label>
          <label>
            日期
            <input id="date" type="date" required />
          </label>
          <label class="full-width">
            备注
            <input id="note" type="text" placeholder="可选" />
          </label>
          <button type="submit">添加记录</button>
        </form>
      </section>

      <section class="card">
        <h2>本月概览</h2>
        <div class="summary">
          <article>
            <h3>总收入</h3>
            <p id="income-total">¥0.00</p>
          </article>
          <article>
            <h3>总支出</h3>
            <p id="expense-total">¥0.00</p>
          </article>
          <article>
            <h3>结余</h3>
            <p id="balance-total">¥0.00</p>
          </article>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>记录列表</h2>
          <button id="clear-btn" class="danger" type="button">清空全部</button>
        </div>
        <ul id="entry-list" class="entry-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
